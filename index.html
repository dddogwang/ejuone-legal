<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJU One</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; color: #3a3a3a; background: #faf8f5; padding: 48px 24px; max-width: 720px; margin: 0 auto; }

        .subtitle { font-size: 16px; color: #888; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-card { display: block; background: #fff; border-radius: 12px; padding: 20px 24px; border: 1px solid #e8e4df; text-decoration: none; color: #2c2c2c; transition: all 0.2s; }
        .link-card:hover { border-color: #d4723c; transform: translateY(-2px); }
        .link-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .link-desc { font-size: 14px; color: #888; }
        footer { margin-top: 48px; text-align: center; font-size: 13px; color: #aaa; }

</head>

    <h1>EJU One</h1>
    <p class="subtitle">A study companion for the Examination for Japanese University Admission.</p>

    <div class="links">
        <a href="privacy.html" class="link-card">
            <div class="link-title">Privacy Policy</div>
            <div class="link-desc">How we collect, use, and protect your information</div>
        </a>
        <a href="terms.html" class="link-card">

        </a>
        <a href="support.html" class="link-card">

    <footer>© 2025 DDDog</footer>
